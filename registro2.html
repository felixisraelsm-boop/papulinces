<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Papulinces</title>
</head>
<body>
    <header>
        <nav>
            <a href="parginaprincipal2.html">Volver al Inicio</a>
        </nav>
        <h1>Crear nueva cuenta</h1>
    </header>

    <main>
        <form id="form-registro">
            <section>
                <h3>Datos de acceso</h3>
                <label for="reg-user">Usuario:</label>
                <input type="text" id="reg-user" name="username" required>
                
                <label for="reg-email">Correo:</label>
                <input type="email" id="reg-email" name="email" required>
                
                <label for="reg-pass">Contraseña:</label>
                <input type="password" id="reg-pass" name="password" required>
            </section>

            <section>
                <h3>Perfil</h3>
                <label for="reg-avatar">Foto de perfil:</label>
                <input type="file" id="reg-avatar" name="avatar" accept="image/*">
            </section>

            <button type="submit" id="btn-finalizar-reg" disabled>Registrarme</button>
        </form>
    </main>
</body>
</html>
