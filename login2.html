<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Papulinces</title>
</head>
<body>
    <header>
        <nav><a href="parginaprincipal2.html">Inicio</a></nav>
        <h1>Iniciar Sesión</h1>
    </header>

    <main>
        <form id="form-login">
            <label for="log-id">Usuario o Correo:</label>
            <input type="text" id="log-id" name="identifier" required>

            <label for="log-pass">Contraseña:</label>
            <input type="password" id="log-pass" name="password" required>

            <button type="submit" id="btn-entrar" disabled>Entrar</button>
        </form>
        <p>¿No tienes cuenta? <a href="registro2.html">Regístrate aquí</a></p>
    </main>
</body>
</html>
